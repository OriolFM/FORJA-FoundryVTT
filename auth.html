<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FORJAPP - Sign In</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .container { text-align: center; max-width: 400px; padding: 0 20px; }
    .error { color: #ff6b6b; margin-top: 1em; }
    .success { color: #51cf66; font-size: 1.2em; }
    .spinner { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #google-btn {
      display: none;
      align-items: center;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      background: #4285f4;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.2s;
    }
    #google-btn.visible { display: inline-flex; }
    #google-btn:hover { background: #3367d6; }
    #google-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    #success-section { margin-top: 20px; }
    #success-section p { margin: 8px 0; }
    .hint { color: #aaa; font-size: 13px; margin-top: 8px; }
    /* Fallback: copy-paste code section (shown only if no session param) */
    #code-section { margin-top: 20px; }
    #auth-code {
      width: 100%;
      padding: 10px;
      font-family: monospace;
      font-size: 12px;
      background: #0d1117;
      color: #58a6ff;
      border: 1px solid #30363d;
      border-radius: 6px;
      word-break: break-all;
      resize: none;
      height: 80px;
      box-sizing: border-box;
    }
    #copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    #copy-btn:hover { background: #2ea043; }
  </style>
</head>
<body>
  <div class="container">
    <p id="status"><span class="spinner">&#9203;</span> Loading...</p>
    <button id="google-btn" type="button">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.9 33 29.4 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.5 18.8 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.4 0-9.9-3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.5l6.2 5.2C36.7 39.3 44 34 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>
      Sign in with Google
    </button>

    <!-- Automatic flow: shown when session param is present -->
    <div id="success-section" hidden>
      <p class="success">&#10003; Authentication complete!</p>
      <p>You can return to Foundry VTT.</p>
      <p class="hint">This window will close automatically in a few seconds.</p>
    </div>

    <!-- Fallback: copy-paste flow (shown when no session param) -->
    <div id="code-section" hidden>
      <p class="success">&#10003; Signed in successfully!</p>
      <p>Copy this code and paste it in Foundry VTT:</p>
      <textarea id="auth-code" readonly></textarea>
      <button id="copy-btn" type="button">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25z"/></svg>
        Copy code
      </button>
      <p class="hint">After pasting, you can close this window.</p>
    </div>
  </div>
  <script type="module">
    const FIREBASE_VERSION = "11.0.0";
    const CDN = `https://www.gstatic.com/firebasejs/${FIREBASE_VERSION}`;

    const params    = new URLSearchParams(window.location.search);
    const sessionId = params.get("session") ?? null;
    const urlKey    = params.get("key")     ?? "";

    const FIREBASE_CONFIG = {
      apiKey: urlKey,
      authDomain: "forjapp.firebaseapp.com",
      projectId: "forjapp",
      storageBucket: "forjapp.firebasestorage.app",
      messagingSenderId: "838748075347",
      appId: "1:838748075347:web:6fb0847ec5156aeb175da6"
    };

    const statusEl      = document.getElementById("status");
    const googleBtn     = document.getElementById("google-btn");
    const successSection = document.getElementById("success-section");
    const codeSection   = document.getElementById("code-section");
    const authCodeEl    = document.getElementById("auth-code");
    const copyBtn       = document.getElementById("copy-btn");

    function showError(msg) {
      statusEl.innerHTML = `<span class="error">&#10007; ${msg}</span>`;
    }

    // Load Firebase SDK (app + auth + firestore)
    let authMod, firestoreMod, app, auth, db;
    try {
      const { initializeApp, getApp } = await import(`${CDN}/firebase-app.js`);
      authMod      = await import(`${CDN}/firebase-auth.js`);
      firestoreMod = await import(`${CDN}/firebase-firestore.js`);

      try { app = getApp("forjapp-auth"); }
      catch { app = initializeApp(FIREBASE_CONFIG, "forjapp-auth"); }

      try {
        auth = authMod.initializeAuth(app, {
          persistence: authMod.browserSessionPersistence,
          popupRedirectResolver: authMod.browserPopupRedirectResolver
        });
      } catch {
        auth = authMod.getAuth(app);
      }

      db = firestoreMod.getFirestore(app);

      statusEl.textContent = "Click the button below to sign in:";
      googleBtn.classList.add("visible");
    } catch (err) {
      console.error("FORJAPP | Failed to load Firebase SDK:", err);
      showError("Failed to load authentication. Check your internet connection.");
    }

    // Shared: process a completed sign-in result
    async function handleSignInResult(result) {
      const credential      = authMod.GoogleAuthProvider.credentialFromResult(result);
      const firebaseIdToken = await result.user.getIdToken();

      if (sessionId) {
        // ── Automatic polling flow ──────────────────────────────────────
        const payload = {
          v:   2,
          fit: firebaseIdToken,
          git: credential?.idToken     ?? null,
          gat: credential?.accessToken ?? null,
          rt:  result.user.refreshToken,
          uid: result.user.uid,
          dn:  result.user.displayName,
          em:  result.user.email,
          createdAt: new Date().toISOString(),
          expiresAt: new Date(Date.now() + 5 * 60 * 1000).toISOString()
        };

        try {
          await firestoreMod.setDoc(
            firestoreMod.doc(db, "authSessions", sessionId),
            payload
          );
        } catch (fsErr) {
          console.error("FORJAPP | Firestore write failed:", fsErr.code, fsErr.message);
          throw fsErr;
        }

        statusEl.hidden  = true;
        googleBtn.hidden = true;
        successSection.hidden = false;
        setTimeout(() => window.close(), 3000);

      } else {
        // ── Fallback: copy-paste flow (no session param) ────────────────
        const payload = {
          v:   1,
          fit: firebaseIdToken,
          git: credential?.idToken     ?? null,
          gat: credential?.accessToken ?? null,
          uid: result.user.uid,
          dn:  result.user.displayName,
          em:  result.user.email
        };
        const code = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));

        statusEl.hidden  = true;
        googleBtn.hidden = true;
        codeSection.hidden = false;
        authCodeEl.value = code;
      }
    }

    // Copy button (fallback flow)
    copyBtn.addEventListener("click", () => {
      authCodeEl.select();
      navigator.clipboard.writeText(authCodeEl.value).then(() => {
        copyBtn.textContent = "Copied!";
        setTimeout(() => { copyBtn.textContent = "Copy code"; }, 2000);
      });
    });

    // Handle Google sign-in via popup
    googleBtn.addEventListener("click", async () => {
      googleBtn.disabled = true;
      statusEl.innerHTML = '<span class="spinner">&#9203;</span> Waiting for Google sign-in...';
      try {
        const provider = new authMod.GoogleAuthProvider();
        const result = await authMod.signInWithPopup(auth, provider);
        await handleSignInResult(result);
      } catch (err) {
        console.error("FORJAPP | signInWithPopup error:", err.code, err.message);
        showError(err.message);
        googleBtn.disabled = false;
        googleBtn.classList.add("visible");
      }
    });
  </script>
</body>
</html>
