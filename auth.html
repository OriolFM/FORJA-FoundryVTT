<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FORJAPP - Sign In</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .container { text-align: center; max-width: 360px; }
    .error { color: #ff6b6b; margin-top: 1em; }
    .success { color: #51cf66; }
    .spinner { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #google-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      background: #4285f4;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.2s;
    }
    #google-btn:hover { background: #3367d6; }
    #google-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .hint { color: #aaa; font-size: 13px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <p id="status"><span class="spinner">&#9203;</span> Loading...</p>
    <button id="google-btn" style="display:none;">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.9 33 29.4 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.5 18.8 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.4 0-9.9-3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.5l6.2 5.2C36.7 39.3 44 34 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>
      Sign in with Google
    </button>
  </div>
  <script type="module">
    const FIREBASE_VERSION = "11.0.0";
    const CDN = `https://www.gstatic.com/firebasejs/${FIREBASE_VERSION}`;

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyDCs6d0Z-VQAi1_tZoar_R7fk2w7-IXq8U",
      authDomain: "forjapp.firebaseapp.com",
      projectId: "forjapp",
      storageBucket: "forjapp.firebasestorage.app",
      messagingSenderId: "838748075347",
      appId: "1:838748075347:web:6fb0847ec5156aeb175da6"
    };

    const statusEl = document.getElementById("status");
    const googleBtn = document.getElementById("google-btn");

    function showError(msg) {
      statusEl.innerHTML = `<span class="error">\u2717 ${msg}</span>`;
    }

    function showSuccess(msg) {
      statusEl.innerHTML = `<span class="success">\u2713 ${msg}</span>`;
    }

    function sendResult(data) {
      // Use localStorage as the cross-window communication channel.
      // This is the most reliable method across all environments
      // (regular browser, Electron, etc).
      // The main Foundry window polls for this key.
      try {
        localStorage.setItem("forjapp-auth-result", JSON.stringify(data));
      } catch (e) {
        console.warn("localStorage write failed:", e);
      }
    }

    // Load Firebase SDK
    let authMod, auth;
    try {
      const { initializeApp, getApp } = await import(`${CDN}/firebase-app.js`);
      authMod = await import(`${CDN}/firebase-auth.js`);

      let app;
      try { app = getApp("forjapp-auth"); } catch { app = initializeApp(FIREBASE_CONFIG, "forjapp-auth"); }

      try {
        auth = authMod.initializeAuth(app, {
          persistence: authMod.browserSessionPersistence,
          popupRedirectResolver: authMod.browserPopupRedirectResolver
        });
      } catch {
        auth = authMod.getAuth(app);
      }

      // SDK loaded - show button
      statusEl.textContent = "Click the button below to sign in:";
      googleBtn.style.display = "inline-flex";
    } catch (err) {
      console.error("FORJAPP | Failed to load Firebase SDK:", err);
      showError("Failed to load authentication. Check your internet connection.");
    }

    // Handle Google sign-in button click
    googleBtn.addEventListener("click", async () => {
      googleBtn.disabled = true;
      statusEl.innerHTML = '<span class="spinner">&#9203;</span> Signing in...';

      try {
        const provider = new authMod.GoogleAuthProvider();
        // signInWithPopup WITH explicit resolver, triggered by user click
        const result = await authMod.signInWithPopup(
          auth, provider, authMod.browserPopupRedirectResolver
        );

        const credential = authMod.GoogleAuthProvider.credentialFromResult(result);
        const firebaseIdToken = await result.user.getIdToken();

        sendResult({
          type: "forjapp-auth-result",
          success: true,
          firebaseIdToken,
          googleIdToken: credential?.idToken || null,
          googleAccessToken: credential?.accessToken || null,
          user: {
            uid: result.user.uid,
            displayName: result.user.displayName,
            email: result.user.email,
            photoURL: result.user.photoURL
          }
        });

        showSuccess("Signed in! This window will close...");
        setTimeout(() => window.close(), 1500);
      } catch (err) {
        console.error("FORJAPP Auth Error:", err);

        if (err.code === "auth/popup-blocked") {
          showError("Popup blocked! Please allow popups for this site and try again.");
        } else if (err.code === "auth/popup-closed-by-user") {
          statusEl.textContent = "Sign-in cancelled. Try again:";
          googleBtn.disabled = false;
          googleBtn.style.display = "inline-flex";
        } else {
          showError(err.message);
        }

        sendResult({
          type: "forjapp-auth-result",
          success: false,
          error: err.message
        });
      }
    });
  </script>
</body>
</html>
